info:
  name: Resolve Incident
  type: http
  seq: 16
  tags:
    - incidents
    - resolve

http:
  method: POST
  url: "{{apiUrl}}/api/v1/incidents/{{incidentId}}/resolve"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

docs: |-
  Resolves current `incidentId` when incident is still actionable.
