info:
  name: Update Scheduler Config
  type: http
  seq: 18
  tags:
    - admin
    - scheduler
    - update

http:
  method: PATCH
  url: "{{apiUrl}}/api/v1/admin/scheduler-config"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "recurringEnabled": true,
        "stopControlMode": "global-pause"
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

docs: |-
  Updates global recurring execution control state.
