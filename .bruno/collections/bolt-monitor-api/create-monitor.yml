info:
  name: Create Monitor
  type: http
  seq: 3
  tags:
    - monitors
    - create

http:
  method: POST
  url: "{{apiUrl}}/api/v1/monitors"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "name": "Homepage",
        "type": "http",
        "intervalSeconds": 60,
        "probeLocations": ["iad"],
        "enabled": true,
        "http": {
          "target": "https://example.com",
          "method": "GET",
          "timeoutMs": 5000,
          "expectedStatusCodes": [200]
        }
      }

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status === 201 && res.body && res.body.monitorId) {
          bru.setVar("monitorId", res.body.monitorId);
        }
  assertions:
    - expression: res.status
      operator: eq
      value: "201"

docs: |-
  Creates an HTTP monitor.

  On success, stores returned `monitorId` into Bruno variable `monitorId`.
