http:
  method: GET
  url: "{{apiUrl}}/api/v1/monitors/{{monitorId}}/audit"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

docs: |-
  Reads audit history for current `monitorId`.
