info:
  name: Acknowledge Incident
  type: http
  seq: 15
  tags:
    - incidents
    - ack

http:
  method: POST
  url: "{{apiUrl}}/api/v1/incidents/{{incidentId}}/ack"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

docs: |-
  Acknowledges current `incidentId` when incident is still actionable.
