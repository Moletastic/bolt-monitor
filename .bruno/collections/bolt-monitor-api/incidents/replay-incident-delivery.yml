info:
  name: Replay Incident Delivery
  type: http
  tags:
    - domain:incidents
    - operation:write
http:
  method: POST
  url: "{{apiUrl}}/api/v1/incidents/{{incidentId}}/deliveries/{{deliveryId}}/replay"
  headers:
    - name: Idempotency-Key
      value: bruno-replay-1
      enabled: true
docs: |-
  Purpose: replay a terminal_failed delivery.
  Setup: operator with default tenant access.
  Expected result: 200 OK with replayed delivery.
