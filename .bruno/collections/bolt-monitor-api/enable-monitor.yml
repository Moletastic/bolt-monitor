info:
  name: Enable Monitor
  type: http
  seq: 11
  tags:
    - monitors
    - enable

http:
  method: POST
  url: "{{apiUrl}}/api/v1/monitors/{{monitorId}}/enable"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

docs: |-
  Enables a previously disabled monitor.
