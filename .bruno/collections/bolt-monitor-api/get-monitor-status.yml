info:
  name: Get Monitor Status
  type: http
  seq: 6
  tags:
    - monitors
    - status

http:
  method: GET
  url: "{{apiUrl}}/api/v1/monitors/{{monitorId}}/status"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

docs: |-
  Fetches latest persisted status summary for `monitorId`.

  Useful when validating monitor detail status section independently from the full monitor payload.
