info:
  name: Disable Monitor
  type: http
  seq: 10
  tags:
    - monitors
    - disable

http:
  method: POST
  url: "{{apiUrl}}/api/v1/monitors/{{monitorId}}/disable"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

docs: |-
  Disables a monitor. Important operational stop control for recurring checks.
