info:
  name: Update Monitor
  type: http
  seq: 9
  tags:
    - monitors
    - update

http:
  method: PATCH
  url: "{{apiUrl}}/api/v1/monitors/{{monitorId}}"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "name": "Homepage Updated",
        "intervalSeconds": 120,
        "probeLocations": ["iad"]
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

docs: |-
  Updates mutable monitor fields.
