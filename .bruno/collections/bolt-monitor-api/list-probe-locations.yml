info:
  name: List Probe Locations
  type: http
  seq: 2
  tags:
    - probe-locations
    - list

http:
  method: GET
  url: "{{apiUrl}}/api/v1/probe-locations"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

docs: |-
  Lists selectable probe locations for dashboard create/edit monitor flows.

  Response is ordered by `displayName` and excludes disabled catalog entries.
