name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    name: Backend Go
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.work
          cache: true
          cache-dependency-path: |
            services/**/go.sum
            shared/**/go.sum
            services/**/go.mod
            shared/**/go.mod

      - name: Install golangci-lint with configured Go
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Run Go CI
        run: make ci-go lint-go build-go

  dashboard:
    name: Dashboard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/dashboard/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm --dir apps/dashboard install --frozen-lockfile --reporter=silent

      - name: Run dashboard release gates
        run: make format-dashboard-check lint-dashboard check-dashboard test-dashboard check-pre-cutover-gate

  infra:
    name: Infrastructure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: infra/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm --dir infra install --frozen-lockfile --reporter=silent

      - name: Run infrastructure release gates
        run: make format-infra-check check-infra test-infra check-pnpm-install-trust
