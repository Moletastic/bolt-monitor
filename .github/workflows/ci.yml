name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    name: Backend Go
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.work
          cache: true
          cache-dependency-path: |
            services/**/go.sum
            shared/**/go.sum
            services/**/go.mod
            shared/**/go.mod

      - name: Setup golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v1.64.8

      - name: Run Go CI
        run: make ci-go lint-go build-go

  dashboard:
    name: Dashboard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm --dir apps/dashboard install --frozen-lockfile --reporter=silent

      - name: Run dashboard release gates
        run: make format-dashboard-check lint-dashboard check-dashboard test-dashboard build-dashboard

  infra:
    name: Infrastructure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm --dir infra install --frozen-lockfile --reporter=silent

      - name: Generate SST types
        run: pnpm --dir infra run install:providers

      - name: Run infrastructure release gates
        run: make format-infra-check check-infra

  api-contract:
    name: API Contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Run Bruno and API contract gates
        run: make check-bruno check-api-contract check-sst-target
