pre-commit:
  jobs:
    - name: format dashboard
      root: "apps/dashboard/"
      glob: "*.{css,js,jsx,json,md,mdx,ts,tsx}"
      run: pnpm exec prettier --write "{staged_files}"
      stage_fixed: true
    - name: format infra
      root: "infra/"
      glob: "*.{css,js,jsx,json,md,mdx,ts,tsx,yaml,yml}"
      run: pnpm exec prettier --write "{staged_files}"
      stage_fixed: true

commit-msg:
  jobs:
    - name: commitlint
      run: make commitlint COMMIT_MSG_FILE="{1}"
