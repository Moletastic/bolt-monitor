<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bolt Monitor API Docs</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, sans-serif;
        background: #09111f;
        color: #e6eefb;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(67, 97, 238, 0.35), transparent 35%),
          radial-gradient(circle at bottom right, rgba(0, 212, 170, 0.2), transparent 30%),
          #09111f;
      }

      main {
        width: min(720px, calc(100% - 32px));
        padding: 32px;
        border: 1px solid rgba(230, 238, 251, 0.12);
        border-radius: 24px;
        background: rgba(9, 17, 31, 0.82);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 5vw, 3rem);
      }

      p {
        margin: 0 0 20px;
        line-height: 1.6;
        color: #b8c7e0;
      }

      .links {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        margin: 24px 0 20px;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 180px;
        padding: 14px 18px;
        border-radius: 14px;
        text-decoration: none;
        font-weight: 600;
      }

      .primary {
        background: linear-gradient(135deg, #4f7cff, #00c9a7);
        color: white;
      }

      .secondary {
        border: 1px solid rgba(230, 238, 251, 0.18);
        color: #e6eefb;
        background: rgba(230, 238, 251, 0.04);
      }

      code {
        padding: 2px 6px;
        border-radius: 6px;
        background: rgba(230, 238, 251, 0.08);
      }
    </style>
  </head>
  <body>
    <main>
      <p>Bolt Monitor</p>
      <h1>API docs</h1>
      <p>
        This workspace serves one checked-in OpenAPI contract in two local views:
        Swagger UI for exploration and Redoc for a cleaner static reference.
      </p>
      <div class="links">
        <a class="primary" href="/swagger.html">Open Swagger UI</a>
        <a class="secondary" href="/redoc.html">Open Redoc</a>
      </div>
      <p>
        Source contract: <code>/openapi/openapi.yaml</code>
      </p>
    </main>
  </body>
</html>
