openapi: 3.1.0
info:
  title: Bolt Monitor API
  version: 1.0.0
  description: Deployed SST API contract. Versioned routes are unauthenticated until the authentication change supplies route metadata.
servers:
  - url: http://127.0.0.1:3000
    description: Replace with current SST API URL.
paths:
  /api/health:
    get:
      operationId: getHealth
      summary: Check service health
      security: []
      responses: {'200': {description: Healthy service, content: {application/json: {schema: {$ref: '#/components/schemas/HealthEnvelope'}}}}}
  /api/v1/search: {get: {operationId: searchResources, responses: {'200': {$ref: '#/components/responses/Success'}}}}
  /api/v1/notification-channels:
    post: {operationId: createNotificationChannel, responses: {'201': {$ref: '#/components/responses/Success'}}}
    get: {operationId: listNotificationChannels, responses: {'200': {$ref: '#/components/responses/Success'}}}
  /api/v1/notification-channels/{channelId}:
    get: {operationId: getNotificationChannel, responses: {'200': {$ref: '#/components/responses/Success'}}}
    put: {operationId: updateNotificationChannel, responses: {'200': {$ref: '#/components/responses/Success'}}}
    delete: {operationId: deleteNotificationChannel, responses: {'204': {description: Deleted}}}
  /api/v1/notification-channels/{channelId}/test: {post: {operationId: testNotificationChannel, responses: {'200': {$ref: '#/components/responses/Success'}}}}
  /api/v1/escalation-policies:
    post: {operationId: createEscalationPolicy, responses: {'201': {$ref: '#/components/responses/Success'}}}
    get: {operationId: listEscalationPolicies, responses: {'200': {$ref: '#/components/responses/Success'}}}
  /api/v1/escalation-policies/{policyId}:
    get: {operationId: getEscalationPolicy, responses: {'200': {$ref: '#/components/responses/Success'}}}
    put: {operationId: updateEscalationPolicy, responses: {'200': {$ref: '#/components/responses/Success'}}}
    delete: {operationId: deleteEscalationPolicy, responses: {'204': {description: Deleted}}}
  /api/v1/services:
    post: {operationId: createService, responses: {'201': {$ref: '#/components/responses/Success'}}}
    get: {operationId: listServices, responses: {'200': {$ref: '#/components/responses/Success'}}}
  /api/v1/services/{serviceId}:
    get: {operationId: getService, responses: {'200': {$ref: '#/components/responses/Success'}}}
    patch: {operationId: updateService, responses: {'200': {$ref: '#/components/responses/Success'}}}
    delete: {operationId: deleteService, responses: {'204': {description: Deleted}}}
  /api/v1/services/{serviceId}/archive: {post: {operationId: archiveService, responses: {'200': {$ref: '#/components/responses/Success'}}}}
  /api/v1/services/{serviceId}/reactivate: {post: {operationId: reactivateService, responses: {'200': {$ref: '#/components/responses/Success'}}}}
  /api/v1/services/{serviceId}/escalation-policy: {get: {operationId: getServiceEscalationPolicy, responses: {'200': {$ref: '#/components/responses/Success'}}}}
  /api/v1/services/{serviceId}/audit: {get: {operationId: getServiceAudit, responses: {'200': {$ref: '#/components/responses/Success'}}}}
  /api/v1/services/{serviceId}/monitors:
    post: {operationId: createMonitor, responses: {'201': {$ref: '#/components/responses/Success'}}}
    get: {operationId: listMonitors, responses: {'200': {$ref: '#/components/responses/Success'}}}
  /api/v1/services/{serviceId}/monitors/{monitorId}:
    get: {operationId: getMonitor, responses: {'200': {$ref: '#/components/responses/Success'}}}
    patch: {operationId: updateMonitor, responses: {'200': {$ref: '#/components/responses/Success'}}}
    delete: {operationId: deleteMonitor, responses: {'204': {description: Deleted}}}
  /api/v1/services/{serviceId}/monitors/{monitorId}/status: {get: {operationId: getMonitorStatus, responses: {'200': {$ref: '#/components/responses/Success'}}}}
  /api/v1/services/{serviceId}/monitors/{monitorId}/runs: {get: {operationId: listMonitorRuns, responses: {'200': {$ref: '#/components/responses/Success'}}}}
  /api/v1/services/{serviceId}/monitors/{monitorId}/run: {post: {operationId: runMonitor, responses: {'200': {$ref: '#/components/responses/Success'}}}}
  /api/v1/services/{serviceId}/monitors/{monitorId}/incidents: {get: {operationId: listMonitorIncidents, responses: {'200': {$ref: '#/components/responses/Success'}}}}
  /api/v1/services/{serviceId}/incidents: {get: {operationId: listServiceIncidents, responses: {'200': {$ref: '#/components/responses/Success'}}}}
  /api/v1/services/{serviceId}/monitors/{monitorId}/audit: {get: {operationId: getMonitorAudit, responses: {'200': {$ref: '#/components/responses/Success'}}}}
  /api/v1/services/{serviceId}/monitors/{monitorId}/enable: {post: {operationId: enableMonitor, responses: {'200': {$ref: '#/components/responses/Success'}}}}
  /api/v1/services/{serviceId}/monitors/{monitorId}/disable: {post: {operationId: disableMonitor, responses: {'200': {$ref: '#/components/responses/Success'}}}}
  /api/v1/services/{serviceId}/monitors/{monitorId}/maintenance/enable: {post: {operationId: enableMonitorMaintenance, responses: {'200': {$ref: '#/components/responses/Success'}}}}
  /api/v1/services/{serviceId}/monitors/{monitorId}/maintenance/disable: {post: {operationId: disableMonitorMaintenance, responses: {'200': {$ref: '#/components/responses/Success'}}}}
  /api/v1/incidents: {get: {operationId: listIncidents, responses: {'200': {$ref: '#/components/responses/Success'}}}}
  /api/v1/incidents/{incidentId}: {get: {operationId: getIncident, responses: {'200': {$ref: '#/components/responses/Success'}}}}
  /api/v1/incidents/{incidentId}/escalation-state: {get: {operationId: getEscalationState, responses: {'200': {$ref: '#/components/responses/Success'}}}}
  /api/v1/incidents/{incidentId}/activities: {get: {operationId: getIncidentActivities, responses: {'200': {$ref: '#/components/responses/Success'}}}}
  /api/v1/incidents/{incidentId}/ack: {post: {operationId: acknowledgeIncident, responses: {'200': {$ref: '#/components/responses/Success'}}}}
  /api/v1/incidents/{incidentId}/resolve: {post: {operationId: resolveIncident, responses: {'200': {$ref: '#/components/responses/Success'}}}}
  /api/v1/admin/scheduler-config:
    get: {operationId: getSchedulerConfig, responses: {'200': {$ref: '#/components/responses/Success'}}}
    patch: {operationId: updateSchedulerConfig, responses: {'200': {$ref: '#/components/responses/Success'}}}
components:
  responses:
    Success:
      description: Standard API success envelope
      content: {application/json: {schema: {$ref: '#/components/schemas/SuccessEnvelope'}}}
  schemas:
    SuccessEnvelope:
      type: object
      required: [status, data]
      properties:
        status: {type: string, const: success}
        data: {}
        message: {type: string}
        pagination: {type: object}
    HealthEnvelope:
      type: object
      required: [status, data]
      properties:
        status: {type: string, const: success}
        data: {type: object, required: [status], properties: {status: {type: string, const: ok}}}
